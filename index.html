<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --ink: #1a1612;
      --ink-light: #6b6056;
      --accent: #c0392b;
      --accent-light: #e8d5d2;
      --rule: #d4c9b8;
      --shadow: rgba(26,22,18,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      background: var(--ink);
      color: var(--bg);
      padding: 56px 64px 40px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.025) 18px,
        rgba(255,255,255,0.025) 19px
      );
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.08;
      position: relative;
    }

    .header-sub {
      margin-top: 14px;
      font-size: 15px;
      font-weight: 300;
      color: rgba(245,240,232,0.6);
      position: relative;
    }

    /* ─── SEARCH & STATS ─────────────────────────── */
    .toolbar {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 0;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-light);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid var(--rule);
      border-radius: 6px;
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    #search:focus { border-color: var(--accent); }

    .stats {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-light);
      white-space: nowrap;
    }

    /* ─── FILE LIST ──────────────────────────────── */
    .list-wrap {
      max-width: 900px;
      margin: 28px auto 0;
      padding: 0 24px;
    }

    .section-rule {
      border: none;
      border-top: 1.5px solid var(--rule);
      margin-bottom: 0;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 22px 20px;
      border-bottom: 1px solid var(--rule);
      background: transparent;
      transition: background .15s;
      animation: fadeUp .35s ease both;
    }

    .file-item:hover { background: var(--surface); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .file-icon {
      flex-shrink: 0;
      width: 44px;
      height: 52px;
      background: var(--surface);
      border: 1.5px solid var(--rule);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .file-icon::after {
      content: 'PDF';
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 2px 0;
      letter-spacing: .08em;
    }

    .file-icon svg { color: var(--ink-light); }

    .file-body {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .file-meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-light);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .file-desc {
      font-size: 13px;
      color: var(--ink-light);
      margin-top: 5px;
      font-weight: 300;
    }

    .file-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ─── DOWNLOAD BUTTON ────────────────────────── */
    .btn-dl {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .06em;
      text-decoration: none;
      text-transform: uppercase;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }

    .btn-dl:hover {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .btn-dl svg { flex-shrink: 0; }

    /* ─── EMPTY STATE ─────────────────────────────── */
    .empty {
      text-align: center;
      padding: 64px 24px;
      display: none;
    }

    .empty svg { color: var(--rule); margin-bottom: 16px; }

    .empty p {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--ink-light);
    }

    /* ─── FOOTER ─────────────────────────────────── */
    footer {
      max-width: 900px;
      margin: 40px auto 0;
      padding: 0 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 600px) {
      header { padding: 40px 24px 32px; }
      .btn-dl span { display: none; }
      .btn-dl { padding: 9px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Document Repository</div>
  <h1>PDF Library</h1>
  <p class="header-sub">Browse, preview, and download your documents</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" type="search" placeholder="Search documents…" autocomplete="off" />
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="list-wrap">
  <hr class="section-rule"/>
  <ul id="file-list" style="list-style:none;"></ul>
  <div class="empty" id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <p>No documents found.</p>
  </div>
</div>

<footer>
  <span>PDF Library — Edit <code>FILES</code> in the script to add your own.</span>
  <span id="footer-count"></span>
</footer>

<script>
  // ─── CONFIGURE YOUR FILES HERE ────────────────────────────────────────────
  // Replace the href values with actual paths/URLs to your PDF files.
  // You can add or remove entries freely.
  const FILES = [
    {
      name: "Annual Report 2024",
      href: "files/annual-report-2024.pdf",
      size: "3.2 MB",
      pages: 48,
      date: "2024-12-01",
      desc: "Full-year financial overview, highlights, and strategic outlook.",
      tags: ["finance", "2024"]
    },
    {
      name: "Product Brochure",
      href: "files/product-brochure.pdf",
      size: "5.8 MB",
      pages: 12,
      date: "2025-03-15",
      desc: "Product catalogue with specifications and pricing details.",
      tags: ["marketing"]
    },
    {
      name: "User Manual — v3.1",
      href: "files/user-manual-v3.1.pdf",
      size: "1.4 MB",
      pages: 96,
      date: "2025-01-10",
      desc: "Step-by-step instructions for setup, operation, and troubleshooting.",
      tags: ["documentation", "technical"]
    },
    {
      name: "Research Paper: AI Trends",
      href: "files/research-ai-trends.pdf",
      size: "890 KB",
      pages: 22,
      date: "2025-04-20",
      desc: "A survey of emerging AI methodologies and industry adoption patterns.",
      tags: ["research", "AI"]
    },
    {
      name: "Project Proposal — Q3",
      href: "files/project-proposal-q3.pdf",
      size: "620 KB",
      pages: 8,
      date: "2025-06-02",
      desc: "Scope, timeline, budget estimate, and team allocation for Q3 initiative.",
      tags: ["planning"]
    },
    {
      name: "Employee Handbook",
      href: "files/employee-handbook.pdf",
      size: "2.1 MB",
      pages: 64,
      date: "2024-09-01",
      desc: "Company policies, benefits, code of conduct, and onboarding guide.",
      tags: ["HR", "internal"]
    },
  ];
  // ─────────────────────────────────────────────────────────────────────────

  const list  = document.getElementById('file-list');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const footerCount = document.getElementById('footer-count');

  function formatDate(str) {
    return new Date(str).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  function render(data) {
    list.innerHTML = '';
    if (!data.length) {
      empty.style.display = 'block';
      stats.textContent = '0 documents';
      return;
    }
    empty.style.display = 'none';
    stats.textContent = `${data.length} document${data.length !== 1 ? 's' : ''}`;

    data.forEach((f, i) => {
      const li = document.createElement('li');
      li.className = 'file-item';
      li.style.animationDelay = `${i * 50}ms`;

      li.innerHTML = `
        <div class="file-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="file-body">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">
            <span>${f.size}</span>
            <span>${f.pages} pages</span>
            <span>${formatDate(f.date)}</span>
          </div>
          ${f.desc ? `<div class="file-desc">${f.desc}</div>` : ''}
          ${f.tags?.length ? `<div class="file-tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
        </div>
        <a class="btn-dl" href="${f.href}" download title="Download ${f.name}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Download</span>
        </a>`;
      list.appendChild(li);
    });
  }

  // Initial render
  render(FILES);
  footerCount.textContent = `${FILES.length} total`;

  // Live search
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    render(!q ? FILES : FILES.filter(f =>
      f.name.toLowerCase().includes(q) ||
      f.desc?.toLowerCase().includes(q) ||
      f.tags?.some(t => t.toLowerCase().includes(q))
    ));
  });
</script>
</body>
</html>
